name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15       # Apple Silicon .dmg
          - platform: windows-latest # Windows installer .exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Notes Viewer ${{ github.ref_name }}'
          releaseBody: 'Automated build from CI.'
          releaseDraft: false
          prerelease: true
