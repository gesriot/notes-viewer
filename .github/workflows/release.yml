name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  macos:
    name: macOS dmg
    permissions:
      contents: write
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: delete previous release (keep tag) for a clean asset set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete ${{ github.ref_name }} --yes --repo ${{ github.repository }} || true

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Notes Viewer ${{ github.ref_name }}'
          releaseBody: |
            Notes Viewer 0.2.0

            A desktop Markdown notes viewer with high-fidelity rendering.

            • Night Owl-inspired visual style – a deep dark-blue color theme
            • JetBrains Mono monospace font
            • Full HTML rendering: tables, KaTeX formulas, code highlighting and inline images
            • Tag search, smooth navigation and vault image handling
            • Lightweight native app built on Tauri 2
          releaseDraft: false
          prerelease: false

  windows:
    name: Windows portable
    needs: macos # release is created by the macOS job; this one appends to it
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe (no installer)
        run: npm run tauri build -- --no-bundle

      - name: assemble portable zip (exe + vault)
        shell: pwsh
        run: |
          $stage = "notes-viewer-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "src-tauri/target/release/notes-viewer.exe" "$stage/"
          Copy-Item -Recurse "vault" "$stage/vault"
          Compress-Archive -Path "$stage/*" -DestinationPath "notes-viewer_${{ github.ref_name }}_windows_x64_portable.zip" -Force

      - name: upload portable zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          body: |
            Notes Viewer 0.2.0

            A desktop Markdown notes viewer with high-fidelity rendering.

            • Night Owl-inspired visual style – a deep dark-blue color theme
            • JetBrains Mono monospace font
            • Full HTML rendering: tables, KaTeX formulas, code highlighting and inline images
            • Tag search, smooth navigation and vault image handling
            • Lightweight native app built on Tauri 2
          files: notes-viewer_${{ github.ref_name }}_windows_x64_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
